name: Sync YouTube Music to Tidal

on:
  schedule:
    - cron: '0 */2 * * *'  # Draait elke 2 uur
  workflow_dispatch:       # Zorgt dat je in GitHub ook handmatig op 'Run' kunt klikken

jobs:
  sync_playlists:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Sync Script
        env:
          YOUTUBE_PLAYLIST_ID: ${{ secrets.YOUTUBE_PLAYLIST_ID }}
          TIDAL_PLAYLIST_ID: ${{ secrets.TIDAL_PLAYLIST_ID }}
          TIDAL_SESSION_ID: ${{ secrets.TIDAL_SESSION_ID }}
          TIDAL_TOKEN_TYPE: ${{ secrets.TIDAL_TOKEN_TYPE }}
          TIDAL_ACCESS_TOKEN: ${{ secrets.TIDAL_ACCESS_TOKEN }}
          TIDAL_REFRESH_TOKEN: ${{ secrets.TIDAL_REFRESH_TOKEN }}
        run: python sync.py
